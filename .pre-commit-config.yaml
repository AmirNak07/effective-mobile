repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: bash -c 'gofmt -w $(find . -name "*.go")'
        language: system
        types: [go]
        pass_filenames: false

      - id: go-imports
        name: goimports
        entry: bash -c 'goimports -w $(find . -name "*.go")'
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'golangci-lint run ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'go mod tidy'
        language: system
        types: [go]
        pass_filenames: false
